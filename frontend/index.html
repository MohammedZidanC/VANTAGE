<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VANTAGE — Focus. Track. Dominate. A premium task management application with a stunning dark UI.">
    <title>VANTAGE — Focus. Track. Dominate.</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- App CSS -->
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/animations.css">
</head>
<body>

    <!-- ── Intro / Opening Animation ──────────────────────────────── -->
    <div id="intro-overlay">
        <div class="intro-logo-group" id="intro-group">
            <svg id="intro-logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#E6B95F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:64px;height:64px;">
                <path class="logo-check" d="M16 34 L26 44 L48 20" stroke-dasharray="300" stroke-dashoffset="300"/>
                <path class="logo-loop" d="M48 20 C52 16 56 20 52 28 C48 36 36 48 26 44 C16 40 12 30 16 22 C20 14 32 12 40 18" stroke-dasharray="300" stroke-dashoffset="300"/>
            </svg>
            <span class="intro-text" id="intro-text">VANTAGE&nbsp;&nbsp;|</span>
        </div>
    </div>

    <!-- ── Loading Spinner ────────────────────────────────────────── -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- ── Map Background ─────────────────────────────────────────── -->
    <div id="map-container">
        <div id="map"></div>
    </div>
    <div id="map-overlay"></div>
    <canvas id="car-lights-canvas"></canvas>

    <!-- ── App Shell ──────────────────────────────────────────────── -->
    <div id="app">

        <!-- Dock Navigation -->
        <nav class="dock" id="dock">
            <a href="/dashboard" data-page="dashboard">Dashboard</a>
            <a href="/info" data-page="info">Info</a>
            <a href="/about" data-page="about">About Me</a>
            <a href="#" data-page="admin" id="admin-dock-link" style="display:none;">Admin</a>
            <a href="#" id="logout-dock-link" style="display:none;">Logout</a>
        </nav>

        <!-- ── Home Content ───────────────────────────────────────── -->
        <main class="page-content" id="home-page">
            <div class="auth-container" id="auth-section">

                <!-- Login Form -->
                <div class="auth-card glass-card" id="login-card">
                    <h2>Welcome Back</h2>
                    <p class="subtitle">Sign in to your VANTAGE account</p>
                    <div class="auth-error" id="login-error"></div>
                    <form id="login-form" autocomplete="off">
                        <div class="form-group">
                            <label for="login-userid">User ID</label>
                            <input type="text" id="login-userid" placeholder="Enter your user ID" required>
                        </div>
                        <div class="form-group">
                            <label for="login-password">Password</label>
                            <input type="password" id="login-password" placeholder="Enter your password" required>
                        </div>
                        <button type="submit" class="btn-gold">Sign In</button>
                    </form>
                    <p class="auth-toggle">
                        Don't have an account? <a href="#" id="show-register">Create one</a>
                    </p>
                </div>

                <!-- Register Form -->
                <div class="auth-card glass-card" id="register-card" style="display:none;">
                    <h2>Create Account</h2>
                    <p class="subtitle">Join VANTAGE and start tracking</p>
                    <div class="auth-error" id="register-error"></div>
                    <form id="register-form" autocomplete="off">
                        <div class="form-group">
                            <label for="reg-fullname">Full Name</label>
                            <input type="text" id="reg-fullname" placeholder="Your full name" required>
                        </div>
                        <div class="form-group">
                            <label for="reg-userid">User ID</label>
                            <input type="text" id="reg-userid" placeholder="Choose a unique ID" required>
                        </div>
                        <div class="form-group">
                            <label for="reg-email">Email</label>
                            <input type="email" id="reg-email" placeholder="you@example.com" required>
                        </div>
                        <div class="form-group">
                            <label for="reg-password">Password</label>
                            <input type="password" id="reg-password" placeholder="Create a password" required>
                        </div>
                        <button type="submit" class="btn-gold">Create Account</button>
                    </form>
                    <p class="auth-toggle">
                        Already have an account? <a href="#" id="show-login">Sign in</a>
                    </p>
                </div>

            </div>
        </main>

    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- App JS -->
    <script src="/js/map.js"></script>
    <script src="/js/animations.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
